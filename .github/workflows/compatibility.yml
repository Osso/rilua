---
name: Compatibility

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_PROFILE_DEV_DEBUG: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  compatibility:
    name: PUC-Rio Lua 5.1.1 Comparison
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install system dependencies
        run: sudo apt-get install -y -qq libreadline-dev

      - name: Cache PUC-Rio Lua binary
        id: cache-lua
        uses: actions/cache@v4
        with:
          path: lua-5.1.1
          key: puc-rio-lua-5.1.1-linux-x64-v2

      - name: Build PUC-Rio Lua 5.1.1
        if: steps.cache-lua.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v5.1.1 https://github.com/lua/lua.git lua-5.1.1
          make -C lua-5.1.1 lua "TESTS="

      - name: Verify Lua binary
        run: ./lua-5.1.1/lua -v

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.92.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "compat-${{ hashFiles('**/Cargo.lock') }}"
          cache-on-failure: true
          cache-all-crates: true
          save-if: ${{ github.event.workflow_run.head_branch == 'main' }}

      - name: Build rilua
        run: cargo build --release

      - name: Run compatibility comparison
        run: scripts/compare.sh ./lua-5.1.1/lua ./target/release/rilua >> "$GITHUB_STEP_SUMMARY"
